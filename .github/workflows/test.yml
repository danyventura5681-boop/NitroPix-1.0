name: NitroPix Build Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias del sistema (Pillow fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev libfreetype6-dev libopenjp2-7-dev libtiff5-dev

      - name: Instalar requirements
        run: pip install -r requirements.txt

      - name: Configurar variables de entorno para tests
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🔧 Configurando entorno para tests..."
          # Si hay secrets, se usarán; si no, modo simulación
          python -c "
import os
print('✅ Entorno configurado para tests')
print(f'REPLICATE_API_TOKEN: {\"✅ Presente\" if os.environ.get(\"REPLICATE_API_TOKEN\") else \"⚠️ Usando simulación\"}')
print(f'BOT_TOKEN: {\"✅ Presente\" if os.environ.get(\"BOT_TOKEN\") else \"⚠️ Usando simulación\"}')
"

      - name: Test import bot
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🧪 Ejecutando tests de importación..."
          python -c "
import os
import sys

# Configurar entorno (igual que en Render pero con fallback para tests)
if not os.environ.get('REPLICATE_API_TOKEN'):
    print('⚠️ Usando token simulado para tests')
    os.environ['REPLICATE_API_TOKEN'] = 'test_token_simulado'

if not os.environ.get('BOT_TOKEN'):
    print('⚠️ Usando token simulado para tests')
    os.environ['BOT_TOKEN'] = 'test_token_simulado'

# Verificar que config.py lee las variables
try:
    from config import Config
    print(f'✅ config.py: BOT_TOKEN leído: {\"✅ OK\" if Config.BOT_TOKEN else \"⚠️ Simulado\"}')
    print(f'✅ config.py: REPLICATE_API_TOKEN leído: {\"✅ OK\" if Config.REPLICATE_API_TOKEN else \"⚠️ Simulado\"}')
except Exception as e:
    print(f'❌ Error en config.py: {e}')
    sys.exit(1)

# Verificar replicate_client.py
try:
    import replicate_client
    print('✅ replicate_client.py importado correctamente')
    
    # Probar función con simulación
    result = replicate_client.generate_image('test prompt')
    print(f'✅ generate_image() respondió: {result}')
except Exception as e:
    print(f'❌ Error en replicate_client.py: {e}')
    sys.exit(1)

# Verificar render_bot.py
try:
    import render_bot
    print('✅ render_bot.py importado correctamente')
except Exception as e:
    print(f'❌ Error en render_bot.py: {e}')
    sys.exit(1)

print('\n🎉 ¡Todos los tests pasaron! El código funcionará en Render.')
"